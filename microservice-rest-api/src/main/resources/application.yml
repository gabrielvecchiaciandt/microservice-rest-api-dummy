server:
  port: 8080

spring:
  application:
    name: microservice-rest-api
    version: ${version}
  
  # Configuração do banco de dados H2
  datasource:
    url: jdbc:h2:mem:plataformavendas
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  # Configuração do JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  # Console H2 (apenas para desenvolvimento)
  h2:
    console:
      enabled: true
      path: /h2-console

#para utilizar o swagger-ui basta habilitar a property abaixo
#path para acessar /swagger-ui/index.html
springdoc:
  swagger-ui:
    enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
    info:
      enabled: true
  endpoints:
    web:
      exposure:
        include: info, health
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: microservice-rest-api
    description: microservice-rest-api
    version: ${version}